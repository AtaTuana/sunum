<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yeşil Liman Politikaları — Tez Sunumu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --void:#030304;
  --surface:#0F1115;
  --fg:#FFFFFF;
  --muted:#94A3B8;
  --border:rgba(255,255,255,0.10);
  --orange:#F7931A;
  --burnt:#EA580C;
  --gold:#FFD600;
  --emerald:#34D399;
  --teal:#2DD4BF;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--void);overflow:hidden}
body{
  font-family:'Inter',sans-serif;color:var(--fg);
  display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(circle at 18% 12%, rgba(247,147,26,0.10), transparent 38%),
    radial-gradient(circle at 85% 88%, rgba(52,211,153,0.07), transparent 42%),
    var(--void);
}
.font-heading{font-family:'Space Grotesk',sans-serif}
.font-mono{font-family:'JetBrains Mono',monospace}

/* ---------- STAGE / SCALING ---------- */
#stage{position:relative;width:1280px;height:720px;transform-origin:center center;}
.slide{
  position:absolute;inset:0;width:1280px;height:720px;
  padding:64px 76px;display:none;flex-direction:column;
  background:
    linear-gradient(180deg, rgba(15,17,21,0.55), rgba(3,3,4,0.85));
  overflow:hidden;
}
.slide.active{display:flex}
.slide::before{ /* grid pattern */
  content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
  background-size:50px 50px;
  background-image:
    linear-gradient(to right, rgba(30,41,59,0.45) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(30,41,59,0.45) 1px, transparent 1px);
  -webkit-mask-image:radial-gradient(circle at center, black 35%, transparent 95%);
  mask-image:radial-gradient(circle at center, black 35%, transparent 95%);
}
.blob{position:absolute;border-radius:50%;filter:blur(120px);opacity:.12;z-index:0;pointer-events:none}
.blob.o{background:var(--orange)}
.blob.g{background:var(--emerald)}
.blob.b{background:var(--burnt)}
.slide > *{position:relative;z-index:2}

/* ---------- COMMON TEXT ---------- */
.kicker{
  font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.28em;
  text-transform:uppercase;color:var(--orange);display:flex;align-items:center;gap:12px;margin-bottom:18px;
}
.kicker .dot{width:8px;height:8px;border-radius:50%;background:var(--orange);box-shadow:0 0 14px var(--orange);position:relative}
.kicker .dot::after{content:"";position:absolute;inset:0;border-radius:50%;background:var(--orange);animation:ping 2.4s cubic-bezier(0,0,.2,1) infinite}
@keyframes ping{75%,100%{transform:scale(2.6);opacity:0}}
h1.title{font-family:'Space Grotesk',sans-serif;font-weight:700;line-height:1.04;letter-spacing:-.02em}
.grad{background:linear-gradient(110deg,var(--orange),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
.grad-g{background:linear-gradient(110deg,var(--emerald),var(--teal));-webkit-background-clip:text;background-clip:text;color:transparent}
.lead{color:var(--muted);font-size:18px;line-height:1.65;max-width:62ch}
.slide-h{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:40px;line-height:1.1;letter-spacing:-.015em;margin-bottom:8px}

/* ---------- CARDS ---------- */
.card{
  background:rgba(15,17,21,0.72);border:1px solid var(--border);border-radius:18px;padding:24px;
  transition:all .3s cubic-bezier(.2,.7,.3,1);backdrop-filter:blur(6px);
}
.card:hover{transform:translateY(-6px);border-color:rgba(247,147,26,0.5);box-shadow:0 0 34px -10px rgba(247,147,26,0.35)}
.card.g:hover{border-color:rgba(52,211,153,0.55);box-shadow:0 0 34px -10px rgba(52,211,153,0.35)}
.glass{background:rgba(255,255,255,0.04);backdrop-filter:blur(14px);border:1px solid var(--border);border-radius:18px}

.icon-box{
  width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  background:rgba(234,88,12,0.16);border:1px solid rgba(234,88,12,0.5);color:var(--orange);
  transition:all .3s ease;
}
.card:hover .icon-box{box-shadow:0 0 22px rgba(234,88,12,0.45)}
.icon-box.g{background:rgba(52,211,153,0.14);border-color:rgba(52,211,153,0.5);color:var(--emerald)}
.icon-box svg{width:24px;height:24px;stroke-width:1.7}

.stat-val{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:42px;line-height:1;letter-spacing:-.02em}
.stat-lbl{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:10px}

.pill{
  display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:12px;
  letter-spacing:.1em;text-transform:uppercase;padding:7px 14px;border-radius:999px;
  border:1px solid var(--border);color:var(--muted);background:rgba(255,255,255,0.03)
}
.pill.o{color:var(--orange);border-color:rgba(247,147,26,0.4)}
.pill.g{color:var(--emerald);border-color:rgba(52,211,153,0.4)}

/* corner accent card */
.corner{position:relative;background:rgba(15,17,21,0.6);border:1px solid var(--border);border-radius:16px;padding:22px;transition:all .3s ease}
.corner::before,.corner::after{content:"";position:absolute;width:26px;height:26px;transition:all .3s ease}
.corner::before{top:-1px;left:-1px;border-top:2px solid var(--orange);border-left:2px solid var(--orange);border-top-left-radius:16px}
.corner::after{bottom:-1px;right:-1px;border-bottom:2px solid var(--orange);border-right:2px solid var(--orange);border-bottom-right-radius:16px}
.corner:hover{transform:translateY(-4px)}
.corner:hover::before,.corner:hover::after{width:40px;height:40px}

/* ---------- TABLE ---------- */
.cmp{width:100%;border-collapse:separate;border-spacing:0;font-size:14.5px}
.cmp th,.cmp td{padding:13px 16px;text-align:left;vertical-align:top;border-bottom:1px solid var(--border)}
/* 16 ve 17. slaytlar için özel tablo düzeni:
   Başlık ve tablo yukarı alındı, açıklama/pill gibi alt öğeler gizlendi.
   Amaç: tablonun tüm satırlarının 720px slayt alanında görünmesi. */
.table-slide{
  padding:18px 34px 24px 34px!important;
}
.table-slide .tag{
  display:none!important;
}
.table-slide .kicker{
  margin-bottom:4px!important;
  font-size:11px!important;
  letter-spacing:.20em!important;
}
.table-slide .slide-h{
  font-size:30px!important;
  line-height:1.02!important;
  margin-bottom:0!important;
}
.table-slide .lead{
  display:none!important;
}
.table-slide .glass{
  margin-top:6px!important;
  padding:4px 6px 0!important;
  overflow:visible!important;
}
.table-slide .cmp{
  font-size:14.2px!important;
  line-height:1.26!important;
}
.table-slide .cmp th{
  font-size:11.4px!important;
  padding:8px 11px!important;
}
.table-slide .cmp td{
  padding:8px 11px!important;
}
.table-slide .cmp td .crit,
.table-slide .cmp .crit{
  font-size:11px!important;
  letter-spacing:.04em!important;
}
.table-slide .pageno{
  bottom:8px!important;
  right:18px!important;
}
.table-slide .table-note,
.table-slide .table-bottom{
  display:none!important;
}
.cmp thead th{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.cmp thead th.eu{color:var(--orange)}
.cmp thead th.tr{color:var(--emerald)}
.cmp td .crit{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.06em;color:#cbd5e1;text-transform:uppercase}
.cmp tr:hover td{background:rgba(255,255,255,0.025)}

/* progress + nav */
#bar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--burnt),var(--gold));z-index:50;transition:width .4s ease;box-shadow:0 0 12px rgba(247,147,26,.6)}
#nav{position:fixed;bottom:22px;right:26px;z-index:50;display:flex;align-items:center;gap:14px}
#nav button{
  width:42px;height:42px;border-radius:999px;border:1px solid var(--border);background:rgba(15,17,21,.8);
  color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s ease;backdrop-filter:blur(8px)
}
#nav button:hover{border-color:var(--orange);color:var(--orange);box-shadow:0 0 18px -4px rgba(247,147,26,.6);transform:scale(1.06)}
#counter{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--muted);letter-spacing:.1em}
#counter b{color:var(--fg)}
.tag{position:absolute;top:30px;left:76px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;color:rgba(148,163,184,.6);text-transform:uppercase;z-index:3}
.pageno{position:absolute;bottom:28px;right:40px;font-family:'JetBrains Mono',monospace;font-size:12px;color:rgba(148,163,184,.55);letter-spacing:.1em;z-index:3}

/* reveal animation */
.slide.active .reveal{animation:rise .6s cubic-bezier(.2,.7,.2,1) both}
@keyframes rise{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

/* orbital cover graphic */
.orbit-wrap{position:absolute;right:90px;top:50%;transform:translateY(-50%);width:340px;height:340px;z-index:1}
.ring{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(247,147,26,.35)}
.ring.r1{animation:spin 16s linear infinite}
.ring.r2{inset:34px;border-color:rgba(255,214,0,.3);border-style:dashed;animation:spin 22s linear infinite reverse}
.ring.r3{inset:74px;border-color:rgba(52,211,153,.35);animation:spin 12s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.core{position:absolute;inset:108px;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(247,147,26,.55),rgba(234,88,12,.15) 60%,transparent);display:flex;align-items:center;justify-content:center;box-shadow:0 0 60px -10px rgba(247,147,26,.6);border:1px solid rgba(247,147,26,.4)}
.core svg{width:62px;height:62px;color:var(--gold)}
.chip{position:absolute;display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:12px;background:rgba(15,17,21,.85);border:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:12px;backdrop-filter:blur(8px);box-shadow:0 0 24px -10px rgba(247,147,26,.4)}
.chip b{color:var(--orange)}
.chip.c1{top:-6px;left:-40px;animation:float 6s ease-in-out infinite}
.chip.c2{bottom:36px;left:-66px;animation:float 7s ease-in-out infinite .8s}
.chip.c3{bottom:-2px;right:-30px;animation:float 6.5s ease-in-out infinite .4s}
.chip.c3 b{color:var(--emerald)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}

.dim{color:var(--muted)}
.ok{color:var(--emerald)}
.no{color:#f87171}
.divline{height:1px;background:linear-gradient(90deg,var(--orange),transparent);width:100%;margin:14px 0}
ul.clean{list-style:none}
ul.clean li{position:relative;padding-left:22px;margin-bottom:10px;line-height:1.5;color:#e2e8f0;font-size:15.5px}
ul.clean li::before{content:"";position:absolute;left:0;top:9px;width:7px;height:7px;border-radius:2px;background:var(--orange);box-shadow:0 0 8px rgba(247,147,26,.7)}
ul.clean.g li::before{background:var(--emerald);box-shadow:0 0 8px rgba(52,211,153,.7)}

@media (prefers-reduced-motion: reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>
<body>
<div id="bar"></div>
<div id="stage"></div>
<div id="nav">
  <span id="counter"><b>01</b> / 20</span>
  <button id="prev" aria-label="Önceki">‹</button>
  <button id="next" aria-label="Sonraki">›</button>
</div>

<script>
const I = { // inline icon paths (lucide-style)
  anchor:'<path d="M12 22V8"/><circle cx="12" cy="5" r="3"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/>',
  leaf:'<path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6"/>',
  target:'<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
  search:'<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
  ship:'<path d="M12 10.189V14"/><path d="M12 2v3"/><path d="M19 13V7a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v6"/><path d="M19.38 20A11.6 11.6 0 0 0 21 14l-8.188-3.639a2 2 0 0 0-1.624 0L3 14a11.6 11.6 0 0 0 2.81 7.76"/><path d="M2 21c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1s1.2 1 2.5 1c2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>',
  layers:'<path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 12.81-9.17 4.16a2 2 0 0 1-1.66 0L2 12.81"/><path d="m22 17.31-9.17 4.16a2 2 0 0 1-1.66 0L2 17.31"/>',
  scale:'<path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/>',
  bolt:'<path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>',
  shield:'<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>',
  globe:'<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>',
  factory:'<path d="M12 16h.01"/><path d="M16 16h.01"/><path d="M3 19a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9.5a.5.5 0 0 0-.74-.44l-4.51 2.46a.4.4 0 0 1-.59-.35V9.5a.5.5 0 0 0-.74-.44L9.5 11.5a.4.4 0 0 1-.6-.35V3a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1z"/><path d="M8 16h.01"/>',
  trend:'<path d="M16 7h6v6"/><path d="m22 7-8.5 8.5-5-5L2 17"/>',
  award:'<path d="m15.477 12.89 1.515 8.526a.5.5 0 0 1-.81.47l-3.58-2.687a1 1 0 0 0-1.197 0l-3.586 2.686a.5.5 0 0 1-.81-.469l1.514-8.526"/><circle cx="12" cy="8" r="6"/>',
  coins:'<circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7.71-2.82 2.82"/>',
  recycle:'<path d="M7 19H4.815a1.83 1.83 0 0 1-1.57-.881 1.785 1.785 0 0 1-.004-1.784L7.196 9.5"/><path d="M11 19h8.203a1.83 1.83 0 0 0 1.556-.89 1.784 1.784 0 0 0 0-1.775l-1.226-2.12"/><path d="m14 16-3 3 3 3"/><path d="M8.293 13.596 7.196 9.5 3.1 10.598"/><path d="m9.344 5.811 1.093-1.892A1.83 1.83 0 0 1 11.985 3a1.784 1.784 0 0 1 1.546.888l3.943 6.843"/><path d="m13.378 9.633 4.096 1.098 1.097-4.096"/>',
  flag:'<path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><path d="M4 22v-7"/>',
  building:'<rect width="16" height="20" x="4" y="2" rx="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01M16 6h.01M12 6h.01M12 10h.01M12 14h.01M16 10h.01M16 14h.01M8 10h.01M8 14h.01"/>',
  droplet:'<path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7"/>',
  wind:'<path d="M12.8 19.6A2 2 0 1 0 14 16H2"/><path d="M17.5 8a2.5 2.5 0 1 1 2 4H2"/><path d="M9.8 4.4A2 2 0 1 1 11 8H2"/>',
  check:'<path d="M20 6 9 17l-5-5"/>',
  x:'<path d="M18 6 6 18M6 6l12 12"/>',
  list:'<path d="M3 5h.01M3 12h.01M3 19h.01M8 5h13M8 12h13M8 19h13"/>',
};
function icon(name, cls){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" class="${cls||''}">${I[name]}</svg>`;}

const slides = [];

/* 0 — KAPAK */
slides.push(`
<div class="blob o" style="width:520px;height:520px;left:-160px;top:-160px"></div>
<div class="blob g" style="width:420px;height:420px;right:-120px;bottom:-150px"></div>
<div style="display:flex;flex-direction:column;justify-content:center;height:100%;max-width:760px">
  <div class="kicker reveal" style="animation-delay:.05s"><span class="dot"></span>İstanbul Kent Üniversitesi · 2026</div>
  <div class="font-mono reveal dim" style="font-size:13px;letter-spacing:.18em;margin-bottom:20px;animation-delay:.1s">İKTİSADİ, İDARİ VE SOSYAL BİLİMLER FAKÜLTESİ · ULUSLARARASI TİCARET VE LOJİSTİK</div>
  <h1 class="title reveal" style="font-size:60px;animation-delay:.18s">Türkiye ve Avrupa'daki Limanların<br><span class="grad-g">Yeşil Dönüşüm</span> Politikalarının<br>Karşılaştırmalı Değerlendirmesi</h1>
  <div class="divline reveal" style="animation-delay:.3s;max-width:420px"></div>
  <div class="reveal" style="display:flex;gap:38px;align-items:flex-end;animation-delay:.36s">
    <div>
      <div class="font-mono dim" style="font-size:11px;letter-spacing:.2em;margin-bottom:6px">HAZIRLAYAN</div>
      <div class="font-heading" style="font-size:22px;font-weight:600">Zülal Cemre Öztürk</div>
    </div>
    <div>
      <div class="font-mono dim" style="font-size:11px;letter-spacing:.2em;margin-bottom:6px">DANIŞMAN</div>
      <div class="font-heading" style="font-size:18px;font-weight:500">Dr. Öğr. Üyesi Ayça Gümüşay</div>
    </div>
  </div>
</div>
<div class="orbit-wrap reveal" style="animation-delay:.2s">
  <div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div>
  <div class="core">${icon('anchor')}</div>
  <div class="chip c1">${icon('ship','')} <span><b>172</b> liman</span></div>
  <div class="chip c2">${icon('trend','')} <span><b>553M</b> ton/2025</span></div>
  <div class="chip c3">${icon('leaf','')} <span>Yeşil&nbsp;Liman</span></div>
</div>
<style>.orbit-wrap .chip svg{width:15px;height:15px;color:var(--orange)} .orbit-wrap .chip.c3 svg{color:var(--emerald)}</style>
`);

/* 1 — AGENDA */
slides.push(`
<div class="tag">00 · Sunum Akışı</div>
<div class="blob o" style="width:380px;height:380px;right:-120px;top:-120px"></div>
<div class="kicker reveal"><span class="dot"></span>İçindekiler</div>
<h2 class="slide-h reveal" style="animation-delay:.05s">Sunum <span class="grad">Akışı</span></h2>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:32px">
  ${[
    ['01','Giriş & Problem','target'],['02','Amaç & Sorular','search'],['03','Yöntem','list'],
    ['04','Liman Kavramı','ship'],['05','Neden Yeşil?','factory'],['06','Sürdürülebilirlik','leaf'],
    ['07','Politika & Araçlar','layers'],['08','Hukuki Çerçeve','scale'],['09','Avrupa & ESPO','globe'],
    ['10','Türkiye Politikası','flag'],['11','Türkiye Verileri','trend'],['12','Örnek Limanlar','building'],
  ].map((a,idx)=>`<div class="corner reveal" style="animation-delay:${.05+idx*.03}s;display:flex;align-items:center;gap:14px;padding:16px 18px">
      <div class="icon-box" style="width:40px;height:40px">${icon(a[2])}</div>
      <div><div class="font-mono" style="font-size:11px;letter-spacing:.16em;color:var(--orange)">${a[0]}</div>
      <div class="font-heading" style="font-size:15px;font-weight:500;margin-top:2px">${a[1]}</div></div>
    </div>`).join('')}

    <span class="pill g">İstanbul Kent Üniversitesi · 2026</span>
  </div>
  <p class="reveal dim" style="animation-delay:.5s;margin-top:24px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.14em">SORULARINIZ İÇİN HAZIRIM</p>
</div>
<style>#stage .orbit-wrap .core svg{width:42px;height:42px}</style>
`);

/* ---------- ENGINE ---------- */
const stage = document.getElementById('stage');
slides.forEach((html,i)=>{
  const d = document.createElement('section');
  d.className='slide'; d.dataset.index=i; if(i===15||i===16)d.classList.add('table-slide'); d.innerHTML=html;
  if(i!==slides.length-1 && i!==0){
    const pn=document.createElement('div'); pn.className='pageno';
    pn.textContent=String(i).padStart(2,'0')+' / '+String(slides.length-2).padStart(2,'0');
    d.appendChild(pn);
  }
  stage.appendChild(d);
});
const slideEls=[...document.querySelectorAll('.slide')];
let cur=0;
const counter=document.getElementById('counter');
const bar=document.getElementById('bar');
function show(n){
  cur=Math.max(0,Math.min(slides.length-1,n));
  slideEls.forEach((s,i)=>s.classList.toggle('active',i===cur));
  // re-trigger reveal animations
  const active=slideEls[cur];
  active.querySelectorAll('.reveal').forEach(el=>{el.style.animation='none';el.offsetHeight;el.style.animation='';});
  counter.innerHTML='<b>'+String(cur+1).padStart(2,'0')+'</b> / '+String(slides.length).padStart(2,'0');
  bar.style.width=((cur)/(slides.length-1)*100)+'%';
}
document.getElementById('next').onclick=()=>show(cur+1);
document.getElementById('prev').onclick=()=>show(cur-1);
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' ')show(cur+1);
  if(e.key==='ArrowLeft'||e.key==='PageUp')show(cur-1);
  if(e.key==='Home')show(0); if(e.key==='End')show(slides.length-1);
  if(e.key==='f'){const el=document.documentElement; if(!document.fullscreenElement)el.requestFullscreen?.(); else document.exitFullscreen?.();}
});
// scaling
function fit(){
  const pad=0;
  const sx=(window.innerWidth-pad)/1280;
  const sy=(window.innerHeight-pad)/720;
  stage.style.transform='scale('+Math.min(sx,sy)+')';
}
window.addEventListener('resize',fit);
fit(); show(0);
</script>
</body>
